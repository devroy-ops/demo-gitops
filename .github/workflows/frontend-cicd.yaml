name: Frontend CI/CD

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # Docker login
    - name: Login to DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # Build image
    - name: Build Docker image
      run: |
        docker build -t devroy/frontend:${{ github.sha }} ./microservices/src/frontend

    # Push image
    - name: Push Docker image
      run: |
        docker push devroy/frontend:${{ github.sha }}

    # Setup kubeconfig
    - name: Set kubeconfig
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

    # Deploy
    - name: Deploy to Kubernetes
      run: |
        kubectl set image deployment/frontend \
        server=devroy/frontend:${{ github.sha }} -n default

        kubectl rollout status deployment/frontend -n default
