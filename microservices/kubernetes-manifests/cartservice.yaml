apiVersion: apps/v1
kind: Deployment
metadata:
  name: cartservice
  labels:
    app: cartservice
spec:
  selector:
    matchLabels:
      app: cartservice
  template:
    metadata:
      labels:
        app: cartservice
    spec:
      serviceAccountName: cartservice
      terminationGracePeriodSeconds: 5
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000

      containers:
      - name: server
        image: devroy/cartservice:latest   # ✅ IMPORTANT (DockerHub image)
        
        ports:
        - containerPort: 8080

        env:
        - name: REDIS_ADDR
          value: "redis-cart:6379"

        resources:
          requests:
            cpu: 200m
            memory: 64Mi
          limits:
            cpu: 300m
            memory: 128Mi

        # ✅ FIXED PROBES (HTTP NOT gRPC)
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 15

        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: cartservice
  labels:
    app: cartservice
spec:
  type: ClusterIP
  selector:
    app: cartservice
  ports:
  - port: 7070
    targetPort: 8080   # ✅ FIXED

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cartservice

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-cart
  labels:
    app: redis-cart
spec:
  selector:
    matchLabels:
      app: redis-cart
  template:
    metadata:
      labels:
        app: redis-cart
    spec:
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000

      containers:
      - name: redis
        image: redis:alpine
        ports:
        - containerPort: 6379

        readinessProbe:
          tcpSocket:
            port: 6379
          periodSeconds: 5

        livenessProbe:
          tcpSocket:
            port: 6379
          periodSeconds: 5

        volumeMounts:
        - mountPath: /data
          name: redis-data

        resources:
          limits:
            memory: 256Mi
            cpu: 125m
          requests:
            cpu: 70m
            memory: 200Mi

      volumes:
      - name: redis-data
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: redis-cart
  labels:
    app: redis-cart
spec:
  type: ClusterIP
  selector:
    app: redis-cart
  ports:
  - port: 6379
    targetPort: 6379
