apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - adservice.yaml
  - cartservice.yaml
  - checkoutservice.yaml
  - currencyservice.yaml
  - emailservice.yaml
  - frontend.yaml
  - paymentservice.yaml
  - productcatalogservice.yaml
  - recommendationservice.yaml
  - shippingservice.yaml

images:
  - name: adservice
    newName: ghcr.io/google-samples/microservices-demo/adservice
    newTag: v0.10.2

  - name: cartservice
    newName: ghcr.io/google-samples/microservices-demo/cartservice
    newTag: v0.10.2

  - name: checkoutservice
    newName: ghcr.io/google-samples/microservices-demo/checkoutservice
    newTag: v0.10.2

  - name: currencyservice
    newName: ghcr.io/google-samples/microservices-demo/currencyservice
    newTag: v0.10.2

  - name: emailservice
    newName: ghcr.io/google-samples/microservices-demo/emailservice
    newTag: v0.10.2

  - name: frontend
    newName: ghcr.io/google-samples/microservices-demo/frontend
    newTag: v0.10.2

  - name: paymentservice
    newName: ghcr.io/google-samples/microservices-demo/paymentservice
    newTag: v0.10.2

  - name: productcatalogservice
    newName: ghcr.io/google-samples/microservices-demo/productcatalogservice
    newTag: v0.10.2

  - name: recommendationservice
    newName: ghcr.io/google-samples/microservices-demo/recommendationservice
    newTag: v0.10.2

  - name: shippingservice
    newName: ghcr.io/google-samples/microservices-demo/shippingservice
    newTag: v0.10.2
