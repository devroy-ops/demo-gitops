apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - frontend.yaml
  - productcatalogservice.yaml
  - currencyservice.yaml
images:
  - name: adservice
    newName: docker.io/kencharos/google-samples-microservices-demo/adservice
    newTag: v0.10.2

  - name: cartservice
    newName: docker.io/kencharos/google-samples-microservices-demo/cartservice
    newTag: v0.10.2

  - name: checkoutservice
    newName: docker.io/kencharos/google-samples-microservices-demo/checkoutservice
    newTag: v0.10.2

  - name: currencyservice
    newName: gcr.io/google-samples/microservices-demo/currencyservice
    newTag: v0.10.2

  - name: emailservice
    newName: docker.io/kencharos/google-samples-microservices-demo/emailservice
    newTag: v0.10.2

  - name: frontend
    newName: devroy/frontend 
    newTag: latest

  - name: paymentservice
    newName: docker.io/kencharos/google-samples-microservices-demo/paymentservice
    newTag: v0.10.2

  - name: productcatalogservice
    newName: devroy/productcatalogservice
    newTag: latest

  - name: recommendationservice
    newName: docker.io/kencharos/google-samples-microservices-demo/recommendationservice
    newTag: v0.10.2

  - name: shippingservice
    newName: docker.io/kencharos/google-samples-microservices-demo/shippingservice
    newTag: v0.10.2
